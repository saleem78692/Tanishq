<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TANISHQ - Shopping</title>
    <link rel="icon" href="assests/images/icon-logo-head.png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <!-- icon -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="assests/css/dashboard.css">
    <link rel="stylesheet" href="assests/css/style.css">

</head>

<body style="background-color: white;">
    <div class="container-fluid m-0 p-0">
        <section id="dashboard-design">
            <!-- BUTTON -->
            <button class="menu-toggle" onclick="toggleSidebar()">☰</button>

            <!-- OVERLAY -->
            <div class="overlay" onclick="toggleSidebar()"></div>

            <!-- SIDEBAR -->
            <aside class="sidebar" id="sidebar">
                <div class="profile">
                    <img src="assests/images/jewellery-care-guide.webp">
                    <h3>Mo Saleem</h3>
                </div>

                <ul>
                    <li><a href="user-profile.html" class="nav-link"><i class="bi bi-person"></i> Profile</a>
                    </li>
                    <li><a href="User-order.html" class="nav-link"><i class="bi bi-box"></i> Orders</a></li>
                    <li><a href="User-wishlist.html" class="nav-link"><i class="bi bi-heart"></i> Wishlist</a></li>
                    <li><a href="User-address.html" class="nav-link"><i class="bi bi-geo-alt"></i> Address</a></li>
                    <li><a href="User-Return.html" class="nav-link active-1"><i class="bi bi-arrow-counterclockwise"></i> Return
                            Product</a>
                    </li>
                    <li><a href="User-Track.html" class="nav-link"><i class="bi bi-box2"></i> Track Product</a></li>
                    <li><a href="User-Setting.html" class="nav-link"><i class="bi bi-gear"></i> Settings</a></li>
                    <li><a href="index.html" class="nav-link"><i class="bi bi-box-arrow-right"></i> Logout</a></li>
                </ul>
            </aside>

            <!-- CONTENT -->
            <div class="content">

                <h1 class="text-center"><i class="bi bi-arrow-counterclockwise"></i> Return Product</h1>

                <div class="container my-4">
                    <div class="card p-4">

                        <!-- Product Info -->
                        <div class="d-flex flex-column flex-sm-row align-items-start align-items-sm-center mb-3">
                            <img src="assests/images/jewellery-care-guide.webp" class="product-thumbnail me-3 mb-2 mb-sm-0">

                            <div>
                                <h5 class="fw-bold">Premium Oversized Cotton T-Shirt</h5>

                                <div class="product-info-text d-flex flex-wrap gap-3 mt-2">
                                    <span>Order ID : #BRX59324</span>
                                    <span>Price : ₹70,000</span>
                                    <span>Qty : 1</span>
                                    <span>Delivered : 12 Mar 2026</span>
                                </div>
                            </div>
                        </div>

                        <hr>

                        <!-- Form -->
                        <form>

                            <!-- Reason -->
                            <div class="mb-4">
                                <label class="form-label">Return Reason</label>
                                <select class="form-select">
                                    <option selected disabled>Select reason</option>
                                    <option>Wrong size</option>
                                    <option>Defective product</option>
                                    <option>Item not as described</option>
                                    <option>Changed my mind</option>
                                </select>
                            </div>

                            <!-- Description -->
                            <div class="mb-4">
                                <label class="form-label">Describe Issue</label>
                                <textarea class="form-control" rows="4"
                                    placeholder="Tell us what went wrong"></textarea>
                            </div>

                            <!-- Photos -->
                            <div class="mb-4">
                                <label class="form-label mb-2">
                                    Upload Product Photos
                                    <span class="text-muted">(at least 3 pictures)</span>
                                </label>

                                <!-- Preview Images -->
                                <div class="row g-3 mb-3">
                                    <div class="col-6 col-sm-4">
                                        <img src="assests/images/jewellery-care-guide.webp" class="uploaded-photo">
                                    </div>
                                    <div class="col-6 col-sm-4">
                                        <img src="assests/images/floral-bloom.webp" class="uploaded-photo">
                                    </div>
                                    <div class="col-6 col-sm-4">
                                        <img src="assests/images/modern-minimal.webp" class="uploaded-photo">
                                    </div>
                                </div>

                                <!-- Upload Box -->
                                <div class="add-photo-box text-center py-3">
                                    <input type="file" id="photo-upload" class="d-none" multiple>

                                    <label for="photo-upload" class="w-100 m-0">
                                        <i class="bi bi-plus-lg fs-5"></i>
                                        <div class="small">Add Photo</div>
                                    </label>
                                </div>
                            </div>

                            <!-- Submit -->
                            <button type="button" class="btn btn-submit-return w-100">
                                Submit Return Request
                            </button>

                        </form>

                    </div>
                </div>


            </div>

        </section>



    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function toggleSidebar() {
            document.getElementById("sidebar").classList.toggle("active");
            document.querySelector(".overlay").classList.toggle("active");
        }



    </script>
</body>

</html>
