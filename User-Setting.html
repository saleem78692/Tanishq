<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="assests/css/style.css">
    <link rel="stylesheet" href="https://www.w3schools.com/w3css/5/w3.css">
</head>

<body style="background-color: white;">
    <div class="container-fluid m-0 p-0">
        <section id="dashboard-design">
            <!-- BUTTON -->
            <button class="menu-toggle" onclick="toggleSidebar()">☰</button>

            <!-- OVERLAY -->
            <div class="overlay" onclick="toggleSidebar()"></div>

            <!-- SIDEBAR -->
            <aside class="sidebar" id="sidebar">
                <div class="profile">
                    <img src="assests/images/jewellery-care-guide.webp">
                    <h3>Mo Saleem</h3>
                </div>

                <ul>
                    <li><a href="user-profile.html" class="nav-link"><i class="bi bi-person"></i> Profile</a>
                    </li>
                    <li><a href="User-order.html" class="nav-link"><i class="bi bi-box"></i> Orders</a></li>
                    <li><a href="User-wishlist.html" class="nav-link"><i class="bi bi-heart"></i> Wishlist</a></li>
                    <li><a href="User-address.html" class="nav-link"><i class="bi bi-geo-alt"></i> Address</a></li>
                    <li><a href="User-Return.html" class="nav-link"><i class="bi bi-arrow-counterclockwise"></i> Return
                            Product</a>
                    </li>
                    <li><a href="User-Track.html" class="nav-link"><i class="bi bi-box2"></i> Track Product</a></li>
                    <li><a href="User-Setting.html" class="nav-link active-1"><i class="bi bi-gear"></i> Settings</a></li>
                    <li><a href="index.html" class="nav-link"><i class="bi bi-box-arrow-right"></i> Logout</a></li>
                </ul>
            </aside>

            <!-- CONTENT -->
            <div class="content">

                <h1 class="text-center"><i class="bi bi-gear"></i> Settings</h1>   

                    <!-- W3 CSS CDN -->
                    <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">

                    <!-- Button -->
                    <div class="accordion-item">
                        <h2 class="accordion-header">
                            <button onclick="document.getElementById('id01').style.display='block'"
                                class="accordion-button collapsed fs-5">
                                🔒 Change Password
                            </button>
                        </h2>
                    </div>

                    <!-- Modal -->
                    <div id="id01" class="w3-modal">
                        <div class="w3-modal-content w3-animate-zoom w3-round-large"
                            style="max-width: 420px; overflow: hidden;">

                            <!-- Header -->
                            <div class="w3-container w3-center"
                                style="background: linear-gradient(135deg,#ff416c,#ff4b2b); color:white; padding:16px;">

                                <span onclick="document.getElementById('id01').style.display='none'"
                                    class="w3-button w3-display-topright w3-large">&times;</span>

                                <h3 class="w3-margin-top">Change Password</h3>
                                <p class="w3-small w3-opacity">Secure your account</p>
                            </div>

                            <!-- Body -->
                            <div class="w3-container w3-padding-16">

                                <form>

                                    <!-- Old Password -->
                                    <label class="w3-text-grey"><b>Old Password</b></label>
                                    <div class="input-box">
                                        <span>🔑</span>
                                        <input class="w3-input w3-border w3-round" type="password"
                                            placeholder="Enter old password" required>
                                    </div>

                                    <!-- New Password -->
                                    <label class="w3-text-grey w3-margin-top"><b>New Password</b></label>
                                    <div class="input-box">
                                        <span>🔒</span>
                                        <input class="w3-input w3-border w3-round" type="password"
                                            placeholder="Enter new password" required>
                                    </div>

                                    <!-- Confirm Password -->
                                    <label class="w3-text-grey w3-margin-top"><b>Confirm Password</b></label>
                                    <div class="input-box">
                                        <span>✔</span>
                                        <input class="w3-input w3-border w3-round" type="password"
                                            placeholder="Re-enter password" required>
                                    </div>

                                </form>
                            </div>

                            <!-- Footer -->
                            <div class="w3-container w3-padding w3-light-grey w3-right-align">
                                <button onclick="document.getElementById('id01').style.display='none'"
                                    class="w3-button w3-border w3-round">Cancel</button>

                                <button class="w3-button w3-round"
                                    style="background: linear-gradient(135deg,#36d1dc,#5b86e5); color:white;">
                                    Update
                                </button>
                            </div>

                        </div>
                    </div>

                     <hr>

                     <!-- Button -->
                    <div class="accordion-item">
                        <h2 class="accordion-header">
                            <button onclick="document.getElementById('id02').style.display='block'"
                                class="accordion-button collapsed fs-5">
                                 🗑️ Delete Account
                            </button>
                        </h2>
                    </div>

                    <!-- Modal -->
                    <div id="id02" class="w3-modal">
                        <div class="w3-modal-content w3-animate-zoom w3-round-large"
                            style="max-width: 420px; overflow: hidden;">

                            <!-- Header -->
                            <div class="w3-container w3-center"
                                style="background: linear-gradient(135deg,#ff416c,#ff4b2b); color:white; padding:16px;">

                                <span onclick="document.getElementById('id02').style.display='none'"
                                    class="w3-button w3-display-topright w3-large">&times;</span>

                                <h3 class="w3-margin-top">Delete Account</h3>
                                <p class="w3-small">Are You Sure Delete Account ?</p>
                            </div>

                            <!-- Body -->
                            <div class="w3-container w3-padding-16">

                                <form>

                                   
                                    <label class="w3-text-grey"><b>Name</b></label>
                                    <div class="input-box">
                                       <span>✏️</span>
                                        <input class="w3-input w3-border w3-round" type="text"
                                            value="Mo Saleem" required>
                                    </div>

                                    
                                    <label class="w3-text-grey w3-margin-top"><b>Mobile Number</b></label>
                                    <div class="input-box">
                                        <span>📞</span>
                                        <input class="w3-input w3-border w3-round" type="tel"
                                            value="+91 9137497814" required>
                                    </div>

                                    
                                    <label class="w3-text-grey w3-margin-top"><b>Address</b></label>
                                    <div class="input-box">
                                        <span>🏠</span>
                                        <input class="w3-input w3-border w3-round" type="text"
                                            value="Lucknow Utter Predesh India 272194" required>
                                    </div>

                                </form>
                            </div>

                            <!-- Footer -->
                            <div class="w3-container w3-padding w3-light-grey w3-right-align">
                                <button onclick="document.getElementById('id02').style.display='none'"
                                    class="w3-button w3-border w3-round">Cancel</button>

                                <button class="w3-button w3-round"
                                    style="background: linear-gradient(135deg,#36d1dc,#5b86e5); color:white;">
                                    Delete
                                </button>
                            </div>

                        </div>
                    </div>


                </div>




            </div>

        </section>


    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function toggleSidebar() {
            document.getElementById("sidebar").classList.toggle("active");
            document.querySelector(".overlay").classList.toggle("active");
        }



    </script>
</body>

</html>
