<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hover Effect Card</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Card Container */
        .product-card {
            display: flex;
            justify-content: center;
            margin-top: 50px;
        }

        /* Image and Icon Box */
        .img-box-1 {
            position: relative;
            width: 320px;
            /* Adjust based on your layout */
            height: 420px;
            overflow: hidden;
            /* Crucial: Keeps images and icons clipped when they are 'off-screen' */
            background-color: #f7f7f7;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            cursor: pointer;
        }

        /* Base Image Styling */
        .img-1 {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            /* Smooth movement transition */
        }

        /* 1. PRIMARY IMAGE EFFECT: On hover, move the default image left */
        .default-img-1 {
            left: 0;
            z-index: 2;
        }

        .img-box-1:hover .default-img-1 {
            transform: translateX(-100%);
            /* Moves completely off-screen to the left */
        }

        /* 2. HOVER IMAGE EFFECT: On hover, slide the second image in from the right */
        .hover-img-1 {
            left: 100%;
            /* Initially positioned outside the box on the right */
            z-index: 1;
            /* Keep it layered behind the default image until needed */
        }

        .img-box-1:hover .hover-img-1 {
            transform: translateX(-100%);
            /* Moves into the box from the right side */
            z-index: 3;
            /* Brings it to the foreground on hover */
        }

        /* 3. Wishlist Icon */
        .wishlist-1 {
            position: absolute;
            top: 15px;
            right: 15px;
            z-index: 10;
            font-size: 1.3rem;
            color: #444;
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .wishlist-1:hover i {
            color: #c9a45c;
            /* Gold accent on hover */
        }

        /* 4. ICON CONTAINER EFFECT: Slides up from the bottom */
        .icons-1 {
            position: absolute;
            bottom: -100px;
            /* Initially hidden well below the container */
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 15px;
            padding-bottom: 25px;
            /* Adjust vertical positioning within the card */
            z-index: 15;
            /* Above both images */
            transition: transform 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            /* Smooth slide up transition */
        }

        /* On hover, slide the icons upward */
        .img-box-1:hover .icons-1 {
            transform: translateY(-90px);
            /* Adjust based on your bottom padding requirement */
        }

        /* Bottom Action Buttons Styling */
        .icons-1 button {
            background-color: white;
            border: none;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
            cursor: pointer;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .icons-1 button a {
            color: #444;
            font-size: 1.2rem;
            display: flex;
            /* Ensures icons center within 'a' tag */
        }

        /* Button Hover State */
        .icons-1 button:hover {
            background-color: #c9a45c;
            /* Gold/brown accent color on button hover */
        }

        .icons-1 button:hover a {
            color: white;
        }
    </style>
</head>

<body>

    <div class="product-card">
        <div class="img-box-1">
            <img src="https://www.tanishq.co.in/dw/image/v2/BKCK_PRD/on/demandware.static/-/Sites-Tanishq-product-catalog/default/dw0c32e305/images/hi-res/50D5L1SEDABA29_1.jpg?sw=480&sh=480"
                class="img-1 default-img-1" alt="Product Front View">

            <img src="https://www.tanishq.co.in/dw/image/v2/BKCK_PRD/on/demandware.static/-/Sites-Tanishq-product-catalog/default/dw407375d1/images/hi-res/50D5L1SEDABA29_2.jpg?sw=480&sh=480"
                class="img-1 hover-img-1" alt="Product Side View">

            <div class="wishlist-1"><i class="bi bi-heart"></i></div>

            <div class="icons-1">
                <button><a href="Jewellery-details.html"><i class="bi bi-eye"></i></a></button>
                <button><a href="cart.html"><i class="bi bi-cart"></i></a></button>
            </div>
        </div>
    </div>

</body>

</html>
